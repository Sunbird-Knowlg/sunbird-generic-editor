name: Publish Sunbird-generic-editor to blob

on:
  push:
    branches:
      - '*'

env:
      NODE_VERSION: 10.24.1
      version_number: ${{ github.ref_name }}
      build_number: ${{ github.run_number }}
      CLOUD_PROVIDER: ${{ vars.CLOUD_PROVIDER || 'gcp' }}

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package.json') }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org/'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpng-dev

      - name: Clone content plugins
        run: |
          git clone https://github.com/Sunbird-Knowlg/sunbird-content-plugins.git plugins -b release-5.2.0

      - name: Install global dependencies
        run: |
          npm install -g bower@1.8.0 grunt-cli@1.2.0 gulp@3.9.1

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        env:
          PHANTOMJS_PLATFORM: linux
          PHANTOMJS_ARCH: x64
          TMPDIR: /tmp

      - name: Install bower dependencies
        working-directory: app
        run: |
          bower cache clean --allow-root
          bower install --force --allow-root

      - name: Build and package
        run: |
          npm install gulp-gzip --save-dev
          npm run build-npm-pkg
          ls -l
          cd generic-editor
          ls -l
          cat index.html

